version: '3.8'

services:
  claude-proxy:
    build: .
    container_name: claude-proxy
    ports:
      - "8000:8000"
    environment:
      - PROXY_HOST=0.0.0.0
      - PROXY_PORT=8000
      - UPSTREAM_API_KEY=${UPSTREAM_API_KEY}
      - UPSTREAM_BASE_URL=${UPSTREAM_BASE_URL:-https://api.deepseek.com/v1}
      - UPSTREAM_MODEL=${UPSTREAM_MODEL:-deepseek-chat}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - ENABLE_MULTI_AGENT=${ENABLE_MULTI_AGENT:-true}
      - MAX_AGENTS=${MAX_AGENTS:-3}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
