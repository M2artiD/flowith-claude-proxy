version: "3.8"

services:
  flowith-proxy:
    build: .
    container_name: flowith-claude-proxy
    env_file:
      - .env
    environment:
      FLOWITH_API_HOST: 0.0.0.0
      FLOWITH_API_PORT: 8787
      FLOWITH_API_PROFILE: all
      FLOWITH_LOCAL_ONLY: "false"
      FLOWITH_REQUIRE_SERVER_KEY: "true"
    ports:
      - "127.0.0.1:8787:8787"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://127.0.0.1:8787/health').raise_for_status()"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
